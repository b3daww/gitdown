name: Upload file from URL

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: "Direct file URL"
        required: true
      file_name:
        description: "Output file name"
        required: true

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Download file
        run: |
          curl -L "${{ inputs.file_url }}" -o "${{ inputs.file_name }}"

      - name: Create release tag
        id: tag
        run: |
          echo "tag=v$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Uploaded file ${{ steps.tag.outputs.tag }}"
          files: ${{ inputs.file_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show download link
        run: |
          echo "File uploaded to release."
