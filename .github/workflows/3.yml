# این فایل با پسوند .yml (یا .yaml) قرار می‌گیرد.
# این ساختار برای سیستم‌های CI/CD (مانند GitHub Actions) طراحی شده است.

name: CI/CD Workflow - Build and Deploy App

# تعیین می‌کنیم که این Workflow چه زمانی فعال شود (مثلاً با هر Push به شاخه main)
on:
  push:
    branches: [ main ]

# تعریف Job اصلی که باید اجرا شود
jobs:
  build_and_deploy:
    # تعیین محیط عملیات (اختیاری: از ماشین مجازی Ubuntu استفاده می‌کنیم)
    runs-on: ubuntu-latest

    # =================================================================
    # 🛠️ گام‌های اجرایی (STEPS) - اینجاست که کد شما اجرا می‌شود.
    # =================================================================
    steps:
      # گام ۱: Check out (قرار دادن کد پروژه)
      # این گام توسط سیستم CI/CD خودکار انجام می‌شود، ولی آن را نگه می‌داریم.
      - name: Checkout Code
        uses: actions/checkout@v3
        
      # =================================================================
      # ۱. آماده‌سازی و تمیزسازی محیط (SETUP & CLEANUP)
      # =================================================================
      - name: 🧹 1. Clean Build Environment
        run: |
          echo "=== شروع پاکسازی محیط بیلد..."
          # 🛠️ کد شما: دستورات پاکسازی دایرکتوری‌های موقت را اینجا قرار دهید.
          # مثال: rm -rf build/artifacts/*
          echo "پاکسازی انجام شد."

      # =================================================================
      # ۲. ساخت و تست (BUILD & TEST)
      # =================================================================
      - name: 🔨 2. Run Build and Tests
        run: |
          echo "=== شروع فرآیند Build و تست..."
          # 🛠️ کد شما: دستورات کامپایل (مثلاً make build) را اینجا قرار دهید.
          # دستور شما باید کامل و موفقیت‌آمیز باشد.
          
          # 🛠️ کد شما: دستورات اجرای تست (مثلاً npm test) را اینجا قرار دهید.
          echo "تست ها با موفقیت انجام شد."
          
      # =================================================================
      # ۳. مدیریت خروجی (ARTIFACT MANAGEMENT)
      # =================================================================
      - name: 📦 3. Package Artifact
        run: |
          echo "=== بسته‌بندی خروجی نهایی..."
          # 🛠️ کد شما: دستورات فشرده‌سازی خروجی (zip/tar) را اینجا قرار دهید.
          # مثال: tar -czf app.tar.gz ./dist
          echo "فایل آرتیفکت ساخته شد."

      # =================================================================
      # ۴. ورژن کنترل (GIT COMMIT & PUSH)
      # توجه: این بخش نیاز به تنظیم Secrets (مثل SSH_KEY) دارد.
      # =================================================================
      - name: 💾 4. Commit and Push Changes
        run: |
          echo "=== شروع عملیات Git === "
          # 🛠️ کد شما: add, commit و push را اینجا قرار دهید.
          # مثال: git add .
          # مثال: git commit -m "Automated build"
          # مثال: git push
          echo "عملیات Git تکمیل شد."

      # =================================================================
      # ۵. استقرار (DEPLOYMENT)
      # =================================================================
      - name: 🌐 5. Deploy to Production
        if: always() # این شرط اطمینان می‌دهد که حتی اگر مراحل قبل شکست خورد، دپلوی اجرا شود. (با احتیاط استفاده کنید)
        run: |
          echo "=== شروع استقرار به محیط اصلی (Production)..."
          # 🛠️ کد شما: دستورات اتصال به سرور، انتقال فایل و راه‌اندازی (Restart) را اینجا قرار دهید.
          # مثال: scp app.tar.gz user@production-server:/var/www/html/
          # مثال: ssh user@production-server "sudo systemctl restart myapp"
          echo "✅ استقرار به اتمام رسید."

